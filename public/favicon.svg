<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Fondo con gradiente -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F7931E;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fondo redondeado -->
  <rect width="64" height="64" rx="12" fill="url(#grad1)"/>
  
  <!-- Documento PDF -->
  <rect x="12" y="8" width="28" height="36" rx="2" fill="white" opacity="0.95"/>
  <rect x="12" y="8" width="28" height="8" rx="2" fill="#E5E7EB"/>
  
  <!-- Líneas de texto (simulando OCR) -->
  <line x1="16" y1="20" x2="36" y2="20" stroke="#4B5563" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="26" x2="32" y2="26" stroke="#4B5563" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="32" x2="34" y2="32" stroke="#4B5563" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="38" x2="30" y2="38" stroke="#4B5563" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Icono de ojo (OCR) -->
  <circle cx="48" cy="20" r="8" fill="white" opacity="0.95"/>
  <circle cx="48" cy="20" r="5" fill="#FF6B35"/>
  <circle cx="48" cy="20" r="2.5" fill="white"/>
  
  <!-- Rayos de escaneo (OCR) -->
  <path d="M 40 12 L 44 16 M 40 28 L 44 24" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <path d="M 52 12 L 56 16 M 52 28 L 56 24" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  
  <!-- Texto "OCR" pequeño -->
  <text x="48" y="35" font-family="Arial, sans-serif" font-size="6" font-weight="bold" fill="white" text-anchor="middle">OCR</text>
</svg>



